services:
  app:
    build:
      context: .
      dockerfile: docker/production/Dockerfile
    image: humfurie-app:latest
    restart: unless-stopped
    # Production: No volume mounts - use built image only
    volumes:
      - laravel-storage:/var/www/html/storage
      - ./.docker/nginx.prod.conf:/etc/nginx/sites-available/default:ro
      - ./.docker/supervisord.prod.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    env_file:
      - .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=shared-postgres
      - DB_PORT=5432
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6380
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
    networks:
      - laravel
      - proxy
      - shared-postgres
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.humfurie.loadbalancer.server.port=80"
      - "traefik.http.routers.humfurie.rule=Host(`humfurie.org`)"
      - "traefik.http.routers.humfurie.entrypoints=websecure"
      - "traefik.http.routers.humfurie.tls=true"
      - "traefik.http.routers.humfurie.tls.certresolver=letsencrypt"
      - "traefik.http.routers.humfurie.middlewares=fallback-errors@file"
      - "traefik.http.routers.humfurie-www.rule=Host(`www.humfurie.org`)"
      - "traefik.http.routers.humfurie-www.entrypoints=websecure"
      - "traefik.http.routers.humfurie-www.tls=true"
      - "traefik.http.routers.humfurie-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.humfurie-www.middlewares=fallback-errors@file"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  redis:
    image: redis:7-alpine  # Specific version + Alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6380:6379'
    networks:
      - laravel
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 256M

  ssr:
    image: humfurie-app:latest
    restart: unless-stopped
    command: node /var/www/html/bootstrap/ssr/ssr.js
    working_dir: /var/www/html
    env_file:
      - .env.production
    environment:
      - APP_ENV=production
      - NODE_ENV=production
      - PORT=13714
    networks:
      - laravel
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:13714/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  og-image:
    build:
      context: ./og-image-service
      dockerfile: Dockerfile
    image: humfurie-og-image:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - laravel
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  laravel:
    driver: bridge
  proxy:
    external: true
    name: proxy
  shared-postgres:
    external: true

volumes:
  laravel-storage:
    driver: local
