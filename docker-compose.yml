services:
    laravel.test:
        build:
            context: ./docker/8.4
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: sail-8.4/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5174}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
            PHP_IDE_CONFIG: "serverName=laravel-react-12"
        volumes:
            - '.:/var/www/html'
            - './.docker/xdebug.ini:/etc/php/8.4/cli/conf.d/99-xdebug.ini'
        networks:
            - sail
            - proxy
        depends_on:
            - shared-postgres

networks:
    sail:
        driver: bridge
    proxy:
        external: true
    shared-postgres:
        external: true


